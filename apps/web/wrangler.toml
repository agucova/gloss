#:schema node_modules/wrangler/config-schema.json
name = "gloss-web"
main = "src/worker.ts"
compatibility_date = "2026-04-17"
account_id = "d2fe37c02a1d31f3239f9c30c8907db7"

# Custom domain
routes = [{ pattern = "gloss.space/*", zone_name = "gloss.space" }]

# Static assets configuration
[assets]
directory = "dist"
binding = "ASSETS"
# Serve index.html for SPA routing (any unmatched routes)
not_found_handling = "single-page-application"
